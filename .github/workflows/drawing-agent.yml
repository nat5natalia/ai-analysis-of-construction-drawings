name: Drawing Agent CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'drawing_agent/**'
      - '.github/workflows/drawing-agent.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push drawing agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./drawing_agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/drawing-agent:latest