version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: drawing_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: drawing_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  drawing_agent:
    build:
      # МЕНЯЕМ КОНТЕКСТ НА ПАПКУ АГЕНТА
      context: ./drawing_agent
      dockerfile: Dockerfile
    container_name: drawing_agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - HF_HOME=/app/models/transformers
    volumes:
      - vector_data:/app/data
      - ./dataset:/app/dataset
      - ./persistent_storage:/app/data
      # Монтируем модели из папки внутри drawing_agent
      - ./drawing_agent/models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  celery-worker:
    build:
      context: .
      dockerfile: celery_worker/Dockerfile
    container_name: drawing_worker
    command: celery -A worker worker --loglevel=info --concurrency=1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
      - AGENT_URL=http://drawing_agent:8000
      - DATASET_PATH=/app/dataset
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/langgraph_db 
    volumes:
      - vector_data:/app/data
      - ./dataset:/app/dataset
      - ./celery_worker:/app
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      drawing_agent:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: drawing_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
      - DATASET_PATH=/app/dataset
      - AGENT_URL=http://drawing_agent:8000
      - PYTHONPATH=/app
    volumes:
      - ./dataset:/app/dataset
      - vector_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      drawing_agent:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: drawing_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
  
  postgres:
    image: postgres:15-alpine 
    container_name: drawing_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langgraph_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  postgres_data:
    driver: local
  vector_data:
    driver: local