version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: drawing_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: drawing_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  drawing-agent:
    build:
      context: .
      dockerfile: drawing_agent/Dockerfile
    container_name: drawing_agent
    ports:
      - "8002:8000"  # Доступен снаружи на 8002, внутри сети на 8000
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./dataset:/app/dataset
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: celery_worker/Dockerfile
    container_name: drawing_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
      - AGENT_URL=http://drawing-agent:8000/process
      - DATASET_PATH=/app/dataset
      - PYTHONPATH=/app  # Добавляем, чтобы воркер видел соседние модули
    volumes:
      - ./dataset:/app/dataset
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: drawing_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
      - DATASET_PATH=/app/dataset
      - PYTHONPATH=/app
    volumes:
      - ./dataset:/app/dataset
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: drawing_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data: